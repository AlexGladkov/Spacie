name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'windows-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('composeApp/**/*.gradle.kts', 'shared/**/*.gradle.kts', 'composeApp/gradle/wrapper/gradle-wrapper.properties', 'shared/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Windows MSI
        working-directory: composeApp
        run: ./gradlew packageMsi --no-daemon -q
        shell: bash

      - name: Find MSI path
        id: msi
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path "composeApp/build/compose/binaries/main/msi/*.msi" | Select-Object -First 1
          if (-not $file) { Write-Error "MSI not found"; exit 1 }
          echo "path=$($file.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($file.Name)" >> $env:GITHUB_OUTPUT
          echo "Found: $($file.FullName)"

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=windows-v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "name=Spacie for Windows v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=Spacie for Windows ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          body: |
            ## Spacie for Windows

            ### Installation
            1. Download `${{ steps.msi.outputs.name }}` below
            2. Run the installer
            3. Install [libimobiledevice](https://github.com/libimobiledevice/libimobiledevice) via Chocolatey:
               ```
               choco install libimobiledevice
               ```

            ### Requirements
            - Windows 10 / 11
            - Chocolatey + libimobiledevice (for iPhone connectivity)
          files: ${{ steps.msi.outputs.path }}
